<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

    <link rel="stylesheet" href="products.css">
</head>
<body>

<header>
    <div class="header-top">
        <div class="search-area">
            <form class="search-form" action="products.html" method="get">
                <input type="search" name="q" placeholder="Search products..." aria-label="Search products">
                <button type="submit">Search</button>
            </form>
        </div>
        <h1>Our Products</h1>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<section>

    <h2>Popular Products</h2>

    <div class="category-filters" role="tablist" aria-label="Product categories">
        <button type="button" class="category-button active" data-category="all">Tümü</button>
        <button type="button" class="category-button" data-category="cilt-bakimi">Cilt Bakımı</button>
        <button type="button" class="category-button" data-category="goz-makyaj">Göz Makyajı</button>
        <button type="button" class="category-button" data-category="dudak-urunleri">Dudak Ürünleri</button>
        <button type="button" class="category-button" data-category="parfum">Parfüm</button>
        <button type="button" class="category-button" data-category="sac-bakimi">Saç Bakımı</button>
        <button type="button" class="category-button" data-category="yüz-makyaji">Yüz Makyajı</utton>
    </div>

    <div class="product-grid">
        <article class="product-card" data-category="dudak-urunleri">
            <a href="images/lipstick.jpg" class="lightbox-trigger">
                <img src="images/lipstick.jpg" alt="Lipstick">
            </a>
            <div class="product-info">
                <h3>Lipstick</h3>

            </a>
            <div class="product-info">
                <h3>Eyeliner</h3>
                <p class="price">$18</p>
            </div>

            </a>
            <div class="product-info">
                <h3>Serum</h3>

            </div>

    <p class="no-results-message" hidden>No matching products were found.</p>

    <div class="lightbox-overlay" hidden>
        <button class="lightbox-close" aria-label="Close image">×</button>
        <img class="lightbox-image" src="" alt="">
    </div>
</section>

<script src="search.js"></script>
</body>
</html>
